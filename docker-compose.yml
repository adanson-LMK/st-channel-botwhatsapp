version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: conauti_db
    environment:
      POSTGRES_DB: conauti_db
      POSTGRES_USER: conauti
      POSTGRES_PASSWORD: changeme_in_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conauti"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: conauti_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 config.wsgi:application"
    environment:
      DEBUG: "False"
      DJANGO_ENV: production
      DATABASE_URL: postgresql://conauti:changeme_in_production@db:5432/conauti_db
      SECRET_KEY: django-insecure-changeme
      ALLOWED_HOSTS: localhost,127.0.0.1,web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: conauti_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
