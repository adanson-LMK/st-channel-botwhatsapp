{% load static %}
<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}"/>
  <title>{% block title %}Flowchat | AI Multi-Agent Platform{% endblock %}</title>

  <!-- Fonts & CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700,800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <!-- Global Styles -->
  <link rel="stylesheet" href="{% static 'landing/css/styles.css' %}">

  {% block extra_css %}{% endblock %}
</head>

<body>
  <!-- Custom cursor -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <!-- Progress bar -->
  <div id="progress-bar"></div>

  <!-- Particles canvas -->
  <canvas id="particles-canvas"></canvas>

  <!-- Navigation -->
  {% include 'includes/navbar.html' %}

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  {% include 'includes/footer.html' %}

  <!-- Scripts -->
  <script src="{% static 'landing/js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
