{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'users/css/account.css' %}">
{% endblock %}

{% block content %}
<!-- Page Wrapper -->
<div class="auth-page">
  <!-- Background Decorations -->
  <div class="auth-bg-decoration">
    <div class="auth-glow auth-glow-1"></div>
    <div class="auth-glow auth-glow-2"></div>
  </div>

  <div class="auth-container">
    <!-- Auth Card -->
    <div class="auth-card glass">
      {% block auth_content %}{% endblock %}
    </div>

    <!-- Social Proof -->
    <div class="auth-social-proof">
      <div class="auth-proof-item">
        <span class="material-symbols-outlined">verified_user</span>
        <span>Encrypted</span>
      </div>
      <div class="auth-proof-item">
        <span class="material-symbols-outlined">bolt</span>
        <span>Fast Setup</span>
      </div>
      <div class="auth-proof-item">
        <span class="material-symbols-outlined">smart_toy</span>
        <span>AI Powered</span>
      </div>
    </div>
  </div>
</div>
{% endblock %}
